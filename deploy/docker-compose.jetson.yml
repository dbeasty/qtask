# Ollama + docker-proxy for Jetson (Orin Nano 8GB / similar).
# Run on the Jetson only — not the app host. Requires /opt/qtask-ollama/.env with
# JETSON_BIND_ADDRESS (service VLAN IP). See deploy/install-jetson-ollama.sh and docs/DEPLOY.md.
#
#   docker compose -f deploy/docker-compose.jetson.yml --env-file .env up -d
#
# Requires NVIDIA Container Toolkit on Jetson for GPU. Without it, remove
# `runtime: nvidia` and the NVIDIA_* environment variables to run CPU-only.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: qtask-ollama
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Pin chat only; embeddings load on demand via app (CPU, keep_alive 0).
      OLLAMA_KEEP_ALIVE: "-1"
      OLLAMA_MAX_LOADED_MODELS: "1"
    volumes:
      - qtask_ollama_data:/root/.ollama
    ports:
      - "${JETSON_BIND_ADDRESS:?Set JETSON_BIND_ADDRESS in .env}:11434:11434"
    networks:
      - qtask_jetson

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: qtask-ollama-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      PING: 1
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${JETSON_BIND_ADDRESS:?Set JETSON_BIND_ADDRESS in .env}:2375:2375"
    networks:
      - qtask_jetson

networks:
  qtask_jetson:
    name: qtask_jetson
    driver: bridge

volumes:
  qtask_ollama_data:
    name: qtask_ollama_data
