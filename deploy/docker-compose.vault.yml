# Optional HashiCorp Vault for QTask (use when SECRETS_BACKEND=vault).
# Bind to loopback only — do not publish 8200 on a public interface.
services:
  vault:
    image: hashicorp/vault:1.17
    container_name: qtask-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_LOCAL_CONFIG: |
        {
          "storage": {
            "file": {
              "path": "/vault/file"
            }
          },
          "listener": [{
            "tcp": {
              "address": "0.0.0.0:8200",
              "tls_disable": true
            }
          }],
          "ui": true,
          "disable_mlock": true,
          "api_addr": "http://127.0.0.1:8200"
        }
    command: server
    volumes:
      - qtask_vault_data:/vault/file
    ports:
      - "127.0.0.1:8200:8200"
    # Exit 0 = unsealed, 2 = sealed but listening — both count as healthy.
    healthcheck:
      test: ["CMD-SHELL", "vault status -address=http://127.0.0.1:8200 >/dev/null 2>&1; code=$$?; [ $$code -eq 0 ] || [ $$code -eq 2 ]"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  qtask_vault_data:
